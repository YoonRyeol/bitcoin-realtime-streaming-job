apiVersion: apps/v1
kind: Deployment
metadata:
  name: ranking-webapp
  namespace: bitcoin-realtime-streaming
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ranking-webapp
  template:
    metadata:
      labels:
        app: ranking-webapp
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: webapp
          image: ghcr.io/yoonryeol/ranking-webapp:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
---
apiVersion: v1
kind: Service
metadata:
  name: ranking-webapp
  namespace: bitcoin-realtime-streaming
spec:
  type: ClusterIP
  selector:
    app: ranking-webapp
  ports:
    - port: 8080
      targetPort: 8080
